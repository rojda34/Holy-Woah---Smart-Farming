<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLY WOAH - Dashboard Pro V19 (English Version)</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #e0eaf5 0%, #f4f7f6 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .sidebar { background-color: #111111; color: white; }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .fade-in-scale { animation: fadeInScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Chart Animations */
        .chart-container { display: flex; align-items: flex-end; height: 120px; gap: 4px; }
        .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; height: 100%; cursor: pointer; position: relative; }
        .chart-bar { width: 100%; border-top-left-radius: 4px; border-top-right-radius: 4px; transform-origin: bottom; animation: growBar 1s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
        @keyframes growBar { from { transform: scaleY(0); } to { transform: scaleY(1); } }
        .chart-bar-wrap:hover .chart-bar { opacity: 0.8; }
        .chart-bar-wrap:hover .tooltip { display: block; }
        
        .animate-draw-line { stroke-dasharray: 500; stroke-dashoffset: 500; animation: drawLine 1.5s ease-out forwards; }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        
        .circle-progress-anim { animation: drawCircleProgress 1.5s ease-out forwards; }
        @keyframes drawCircleProgress { from { stroke-dashoffset: 283; } }

        .tooltip { display: none; position: absolute; bottom: calc(100% + 5px); background: #111; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; z-index: 50; }
        
        .pulse-red { animation: pulse-red-anim 2s infinite; }
        @keyframes pulse-red-anim { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .line-hover-zone:hover .line-tooltip { display: block; }
        .line-tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; z-index: 50; margin-bottom: 5px; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }

        .smooth-scroll::-webkit-scrollbar { width: 6px; }
        .smooth-scroll::-webkit-scrollbar-track { background: transparent; }
        .smooth-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        
        .maplibregl-map { font-family: inherit; border-radius: 1rem; }
    </style>
</head>
<body class="p-4 h-screen w-screen overflow-hidden flex items-center justify-center">

    <div id="root" class="w-full h-full max-w-[1600px] flex gap-6"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- EXTRACTED CHART COMPONENTS (Prevents re-rendering when chatting) ---
        const MiniLineChart = React.memo(({ data, dataKey, label, max, trend, trendUp, unit }) => {
            const points = data.map((item, i) => `${i * (100 / (data.length - 1))},${60 - (item[dataKey] / max) * 60}`).join(' ');
            return (
                <div className="bg-white/80 p-4 rounded-2xl border border-gray-100 shadow-sm flex flex-col justify-between" style={{height: '220px'}}>
                    <div className="flex justify-between items-start mb-2"><h4 className="font-bold text-gray-800 text-sm">{label}</h4><span className={`text-xs font-bold ${trendUp ? 'text-green-500' : 'text-red-500'}`}>{trend}</span></div>
                    <div className="flex-1 w-full relative flex items-end justify-center py-2">
                        <svg viewBox="0 -5 100 70" className="w-full h-full overflow-visible absolute inset-0 pointer-events-none" preserveAspectRatio="none">
                            <polyline points={points} fill="none" stroke="#2563eb" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="animate-draw-line" />
                            {data.map((item, i) => <circle key={i} cx={i * (100 / (data.length - 1))} cy={60 - (item[dataKey] / max) * 60} r="2.5" fill="#1e40af" />)}
                        </svg>
                        <div className="absolute inset-0 flex justify-between">{data.map((item, i) => <div key={i} className="h-full flex-1 line-hover-zone relative cursor-pointer flex flex-col justify-end items-center"><div className="line-tooltip">{item.day}: {item[dataKey].toFixed(1)}{unit}</div></div>)}</div>
                    </div>
                    <div className="flex justify-between w-full mt-2">{data.map((item, idx) => <span key={idx} className="text-[10px] text-gray-400 font-medium">{item.day}</span>)}</div>
                </div>
            );
        });

        const MiniBarChartGradient = React.memo(({ data, dataKey, label, max, unit, trend, trendUp }) => {
            return (
                <div className="bg-white/80 p-4 rounded-2xl border border-gray-100 shadow-sm flex flex-col justify-between" style={{height: '220px'}}>
                    <div className="flex justify-between items-start mb-2"><h4 className="font-bold text-gray-800 text-sm">{label}</h4><span className={`text-xs font-bold ${trendUp ? 'text-green-500' : 'text-red-500'}`}>{trend}</span></div>
                    <div className="chart-container flex-1 mt-2">
                        {data.map((item, idx) => {
                            const heightPct = item[dataKey] / max;
                            return (
                                <div key={idx} className="chart-bar-wrap">
                                    <div className="tooltip">{item.day}: {item[dataKey].toFixed(0)}{unit}</div>
                                    <span className="text-[10px] font-bold text-gray-500 mb-1">{item[dataKey].toFixed(0)}</span>
                                    <div className="chart-bar" style={{ height: `${heightPct * 100}%`, backgroundColor: `hsl(220, 90%, ${95 - (heightPct * 75)}%)` }}></div>
                                    <span className="text-[10px] text-gray-400 mt-1 font-medium">{item.day}</span>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        });

        // Data Generator
        const generateModules = () => {
            const mods = []; let idCounter = 1;
            const issues = ["Clogged pump", "Water leak", "Unbalanced PH", "Failing NPK sensor", "Fungal infection detected"];
            const actions = ["Sending purge technician", "Automatic sealing valve B", "Injecting alkaline buffer", "Restarting telemetry", "Increasing ventilation to 100%"];
            const blockCenters = []; const centerLat = 41.3888; const centerLng = 2.1616;
            const numRows = 70; const numCols = 90; const latSpacing = 0.00133; const lngSpacing = 0.00175; const angle = -0.68; 

            for (let i = -numRows/2; i < numRows/2; i++) {
                for (let j = -numCols/2; j < numCols/2; j++) {
                    if (Math.random() > 0.88) { 
                        const x = j * lngSpacing; const y = i * latSpacing;
                        const rotX = x * Math.cos(angle) - y * Math.sin(angle);
                        const rotY = x * Math.sin(angle) + y * Math.cos(angle);
                        const finalLat = centerLat + rotY; const finalLng = centerLng + rotX;
                        if (finalLat < 41.345 || finalLat > 41.425 || finalLng < 2.110 || finalLng > 2.225 || finalLat < 41.37 + (finalLng - 2.16) * 0.8) continue;
                        blockCenters.push({ lat: finalLat, lng: finalLng });
                    }
                }
            }

            blockCenters.forEach(center => {
                const latOffset = (Math.random() - 0.5) * 0.0007; const lngOffset = (Math.random() - 0.5) * 0.0007;
                const isRed = Math.random() > 0.94; const issueIdx = Math.floor(Math.random() * issues.length);
                mods.push({
                    id: idCounter, name: `Module BCN-${idCounter.toString().padStart(4, '0')}`, status: isRed ? "red" : "green",
                    lat: center.lat + latOffset, lng: center.lng + lngOffset, water: Math.floor(Math.random() * 450 + 50) + " L",
                    health: isRed ? Math.floor(Math.random() * 30 + 30) + "%" : Math.floor(Math.random() * 15 + 85) + "%",
                    plants: ["Tomatoes", "Lettuce", "Strawberries", "Mint", "Basil", "Peppers", "Arugula"][Math.floor(Math.random()*7)],
                    harvestDays: Math.floor(Math.random() * 25 + 2), isMine: false, issue: isRed ? issues[issueIdx] : null, action: isRed ? actions[issueIdx] : null
                });
                idCounter++;
            });
            mods[0].isMine = true; mods[0].name = "Eixample Terrace (MY MODULE)"; mods[0].status = "green"; mods[0].lat = 41.3888; mods[0].lng = 2.1616;
            return mods;
        };

        const allUrbanModules = generateModules();

        const urbanCropData = [
            { name: "Tomatoes", count: 3450, color: "bg-red-500" }, { name: "Lettuce", count: 2890, color: "bg-green-400" },
            { name: "Mint", count: 1640, color: "bg-teal-500" }, { name: "Strawberries", count: 1290, color: "bg-pink-500" },
            { name: "Basil", count: 910, color: "bg-emerald-600" }, { name: "Peppers", count: 780, color: "bg-orange-500" },
            { name: "Arugula", count: 650, color: "bg-green-600" }
        ];

        const initialWeekData = [
            { day: 'Mon', ph: 6.2, water: 60, potassium: 30, sodium: 10 }, { day: 'Tue', ph: 6.5, water: 80, potassium: 45, sodium: 15 },
            { day: 'Wed', ph: 6.6, water: 75, potassium: 42, sodium: 16 }, { day: 'Thu', ph: 6.4, water: 50, potassium: 38, sodium: 14 },
            { day: 'Fri', ph: 6.8, water: 90, potassium: 50, sodium: 18 }, { day: 'Sat', ph: 6.5, water: 85, potassium: 48, sodium: 15 },
            { day: 'Sun', ph: 6.5, water: 70, potassium: 44, sodium: 14 }
        ];

        const IconProfile = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-8 h-8"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>;
        const IconDashboard = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-8 h-8"><path strokeLinecap="round" strokeLinejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" /></svg>;
        const IconMap = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-8 h-8"><path strokeLinecap="round" strokeLinejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z" /></svg>;
        const IconSettings = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-8 h-8"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12a7.5 7.5 0 0015 0m-15 0a7.5 7.5 0 1115 0m-15 0H3m16.5 0H21m-1.5 0a7.5 7.5 0 11-15 0m15 0a7.5 7.5 0 10-15 0M4.5 19.5l-2.25-2.25M19.5 4.5l2.25 2.25m-15 0l-2.25 2.25m15 10.5l2.25-2.25" /></svg>;

        const UrbanMap3D = React.memo(({ modules, onSelectModule, selectedModuleId }) => {
            const mapRef = useRef(null); const mapInstance = useRef(null); const markersRef = useRef({});
            useEffect(() => {
                if (!mapInstance.current && mapRef.current) {
                    mapInstance.current = new maplibregl.Map({
                        container: mapRef.current, style: 'https://tiles.openfreemap.org/styles/positron', 
                        center: [2.1616, 41.3888], zoom: 14.5, pitch: 60, bearing: -17, attributionControl: false
                    });
                    mapInstance.current.on('load', () => {
                        const layers = mapInstance.current.getStyle().layers; let labelLayerId;
                        for (let i = 0; i < layers.length; i++) { if (layers[i].type === 'symbol' && layers[i].layout['text-field']) { labelLayerId = layers[i].id; break; } }
                        mapInstance.current.addLayer({
                            'id': '3d-buildings', 'source': 'openmaptiles', 'source-layer': 'building', 'filter': ['!=', ['get', 'hide_3d'], true], 'type': 'fill-extrusion', 'minzoom': 13,
                            'paint': { 'fill-extrusion-color': '#e2e8f0', 'fill-extrusion-height': ['coalesce', ['get', 'render_height'], ['get', 'height'], 12], 'fill-extrusion-base': ['coalesce', ['get', 'render_min_height'], ['get', 'min_height'], 0], 'fill-extrusion-opacity': 0.85 }
                        }, labelLayerId);
                    });
                }
                if (mapInstance.current) {
                    Object.values(markersRef.current).forEach(marker => marker.remove());
                    markersRef.current = {};
                    modules.forEach(mod => {
                        const isSelected = selectedModuleId === mod.id;
                        const el = document.createElement('div');
                        el.className = `w-4 h-4 rounded-full shadow-md cursor-pointer flex items-center justify-center transition-all duration-300 ${mod.status === 'green' ? 'bg-green-500' : 'bg-red-500 pulse-red'} ${mod.isMine ? 'border-[3px] border-blue-500 ring-4 ring-blue-200' : 'border-[2px] border-white'} ${isSelected ? 'scale-[2.5] ring-4 ring-yellow-400 z-50 shadow-2xl' : 'hover:scale-125 z-10'}`;
                        if(mod.isMine) el.innerHTML = '<div class="w-1.5 h-1.5 bg-white rounded-full"></div>';
                        el.addEventListener('click', (e) => { e.stopPropagation(); onSelectModule(mod); mapInstance.current.flyTo({ center: [mod.lng, mod.lat], zoom: 17, pitch: 65, essential: true }); });
                        const marker = new maplibregl.Marker({ element: el }).setLngLat([mod.lng, mod.lat]).addTo(mapInstance.current);
                        markersRef.current[mod.id] = marker;
                    });
                }
            }, [modules, selectedModuleId, onSelectModule]);
            return <div ref={mapRef} className="w-full h-full z-10 rounded-2xl overflow-hidden bg-[#e5e7eb]"></div>;
        });

        const RealRadarChart = React.memo(({ data }) => {
            const maxes = { ph: 10, potassium: 60, water: 100, sodium: 30 }; const metrics = ['ph', 'potassium', 'water', 'sodium']; 
            const radius = 40; const center = 50;
            const points = metrics.map((m, i) => { const angle = (Math.PI * 2 * i) / metrics.length - Math.PI / 2; const r = (data[m] / maxes[m]) * radius; return `${center + r * Math.cos(angle)},${center + r * Math.sin(angle)}`; }).join(' ');
            return (
                <div className="w-full h-[120px] flex items-center justify-center relative">
                    <svg viewBox="0 0 100 100" className="w-full h-full overflow-visible">
                        <polygon points="50,10 90,50 50,90 10,50" fill="none" stroke="#bbf7d0" strokeWidth="0.5" />
                        <polygon points="50,30 70,50 50,70 30,50" fill="none" stroke="#bbf7d0" strokeWidth="0.5" />
                        <line x1="50" y1="10" x2="50" y2="90" stroke="#bbf7d0" strokeWidth="0.5" />
                        <line x1="10" y1="50" x2="90" y2="50" stroke="#bbf7d0" strokeWidth="0.5" />
                        <polygon points={points} fill="rgba(34,197,94,0.3)" stroke="#16a34a" strokeWidth="1.5" strokeLinejoin="round" className="animate-draw-line" />
                        {metrics.map((m, i) => {
                            const angle = (Math.PI * 2 * i) / metrics.length - Math.PI / 2; const r = (data[m] / maxes[m]) * radius; const cx = center + r * Math.cos(angle); const cy = center + r * Math.sin(angle);
                            let textAnchor = "middle"; let dx = 0; let dy = 0;
                            if (i === 0) { dy = -6; } if (i === 1) { textAnchor = "start"; dx = 6; dy = 3; } if (i === 2) { dy = 10; } if (i === 3) { textAnchor = "end"; dx = -6; dy = 3; } 
                            return <g key={m}><circle cx={cx} cy={cy} r="3" fill="#15803d" stroke="#fff" strokeWidth="1" /><text x={cx} y={cy} dx={dx} dy={dy} fontSize="6" fontWeight="bold" fill="#064e3b" textAnchor={textAnchor}>{data[m]}</text></g>
                        })}
                    </svg>
                    <span className="absolute text-[9px] font-bold text-green-700 top-0 left-1/2 -translate-x-1/2 -mt-2">pH</span><span className="absolute text-[9px] font-bold text-green-700 top-1/2 right-0 translate-y-[-50%] -mr-4">K</span><span className="absolute text-[9px] font-bold text-green-700 bottom-0 left-1/2 -translate-x-1/2 -mb-2">H2O</span><span className="absolute text-[9px] font-bold text-green-700 top-1/2 left-0 translate-y-[-50%] -ml-4">Na</span>
                </div>
            );
        });

        const CircularWaterChart = React.memo(({ percentage }) => {
            const sqSize = 100; const strokeWidth = 10; const radius = (sqSize - strokeWidth) / 2; const viewBox = `0 0 ${sqSize} ${sqSize}`;
            const dashArray = radius * Math.PI * 2; const dashOffset = dashArray - dashArray * percentage / 100;
            return (
                <div className="relative flex items-center justify-center">
                    <svg width={sqSize} height={sqSize} viewBox={viewBox}>
                        <circle className="stroke-blue-100" cx={sqSize/2} cy={sqSize/2} r={radius} strokeWidth={`${strokeWidth}px`} fill="none" />
                        <circle className="stroke-blue-500 circle-progress-anim" cx={sqSize/2} cy={sqSize/2} r={radius} strokeWidth={`${strokeWidth}px`} fill="none" strokeDasharray={dashArray} strokeDashoffset={dashOffset} strokeLinecap="round" transform={`rotate(-90 ${sqSize/2} ${sqSize/2})`} />
                    </svg>
                    <div className="absolute inset-0 flex items-center justify-center flex-col"><span className="text-2xl font-black text-blue-600 leading-none">{percentage}%</span></div>
                </div>
            );
        });

        function App() {
            const [activeView, setActiveView] = useState('management'); 
            const [isLoadingView, setIsLoadingView] = useState(false);
            const [selectedModule, setSelectedModule] = useState(allUrbanModules[0]); 
            const [userName, setUserName] = useState("Marita");
            const [userEmail, setUserEmail] = useState("marita.botanica@bcn.es");
            const [avatarPic, setAvatarPic] = useState("https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&auto=format&fit=crop&w=256&q=80");
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncStatus, setSyncStatus] = useState("");
            const [urbanRightTab, setUrbanRightTab] = useState('city');
            const fileInputRef = useRef(null);
            
            const [weekData] = useState(initialWeekData);

            // --- HARVEST COUNTDOWN LOGIC ---
            // Set target to exactly 14 days, 8 hours, 32 minutes, and 10 seconds from when the component first mounts
            const [targetTime] = useState(() => Date.now() + (14 * 86400 + 8 * 3600 + 32 * 60 + 10) * 1000);
            const [countdownStr, setCountdownStr] = useState("14d 08:32:10");

            useEffect(() => {
                const timer = setInterval(() => {
                    const diff = Math.max(0, Math.floor((targetTime - Date.now()) / 1000));
                    const d = Math.floor(diff / 86400);
                    const h = Math.floor((diff % 86400) / 3600);
                    const m = Math.floor((diff % 3600) / 60);
                    const s = diff % 60;
                    setCountdownStr(`${d}d ${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`);
                }, 1000);
                return () => clearInterval(timer);
            }, [targetTime]);
            // -------------------------------

            const initialMessage = { sender: 'bot', text: `Hi ${userName}! My analysis engine is connected. You can interact simply or ask for advanced insights:\n\n💬 **Classic Options:**\n• "Hello" / "Help" / "What can you do?"\n• "General summary" / "Active alerts"\n\n📊 **Deep Analysis (Droppy AI Pro):**\n• "Why is health at 78%?"\n• "NPK level and conductivity"\n• "Fungus risk and weather"\n• "Harvest prediction and market"` };
            const [chatInput, setChatInput] = useState("");
            const [messages, setMessages] = useState([initialMessage]);
            const chatEndRef = useRef(null);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const handleNavigate = (view) => {
                if (view === activeView) return;
                setIsLoadingView(true);
                setTimeout(() => { setActiveView(view); setIsLoadingView(false); }, 700);
            };

            const handleSync = () => { setIsSyncing(true); setSyncStatus("Connecting..."); setTimeout(() => { setSyncStatus("Module Synced"); setIsSyncing(false); }, 2000); };
            const clearChat = () => setMessages([initialMessage]);
            
            const handleImageChange = (e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onloadend = () => { setAvatarPic(reader.result); }; reader.readAsDataURL(file); } };

            const handleSendMessage = (e) => {
                if (e.key === 'Enter' || e.type === 'click') {
                    if (!chatInput.trim()) return;
                    const userMsg = chatInput.trim();
                    const lowerInput = userMsg.toLowerCase();
                    setMessages(prev => [...prev, { sender: 'user', text: userMsg }]);
                    setChatInput("");

                    setTimeout(() => {
                        let response = "I don't understand that command. Try asking for a **general summary**, detailed **health**, **weather** data, or **hardware** help.";

                        // A. CLASSIC COMMANDS
                        if (/(hello|hi|hey|greetings)/.test(lowerInput)) {
                            response = `Hello again, ${userName}! 👋 Everything is working correctly in your *Eixample Terrace* module. How can I help you today?`;
                        } else if (/(help|commands|what can you do|options)/.test(lowerInput)) {
                            response = `**My current capabilities:**\n\n1. 📈 Deep analysis (Ask for pH, NPK, or health details).\n2. 🌧️ Predictions (Weather, autonomous irrigation).\n3. 🏙️ Global Network (Impact in Barcelona).\n4. 🛠️ Support (Sensor and valve diagnostics).`;
                        } else if (/(summary|general|how is everything|status|quick)/.test(lowerInput)) {
                            response = `**Quick Summary:**\n✅ Health: 78.5% (Stable)\n✅ Tank: 45% (Adequate)\n✅ Next Harvest: In 14 days.\n*There are no critical alerts requiring your attention.*`;
                        }
                        
                        // B. DEEP ANALYSIS (V17)
                        else if (/(health|state|why|crop|good|bad)/.test(lowerInput)) {
                            response = `**Deep Health Analysis (78.5%):**\nYour crop is healthy, but the AI penalized the total score by 21.5% for these exact reasons:\n\n• **Sunlight:** Average of 4.2h/day in the last 72h (Ideal >6h). Cloudiness affected it.\n• **Water pH:** 6.5. *(Perfect)*.\n• **Conductivity (EC):** 1.8 mS/cm. *(Normal)*.\n\n*Action:* Don't worry, clear skies are forecasted for tomorrow.`;
                        } else if (/(nutrient|fertilizer|npk|potassium|sodium|phosphorus|nitrogen)/.test(lowerInput)) {
                            response = `**Biometric Nutrient Reading:**\nCurrently injecting *Flowering Phase*.\n\n• **Potassium (K):** 44 mg/L. Increased by 15% for fattening.\n• **Nitrogen (N):** 115 ppm. Kept low.\n• **Sodium (Na):** 14 mg/L. Excellent.\n\n*Everything is automated.* Tank A at 80%.`;
                        } else if (/(water|irrigation|humidity|weather|rain|tank)/.test(lowerInput)) {
                            response = `**Predictive Irrigation Management:**\n\n• **Current Tank:** 45% (Approx. 22.5L).\n• **Daily Consumption:** 1.8 L/day.\n\n*Autonomous Decision:* I have paused the evening irrigation. The radar shows an **85% chance of rain** in Barcelona around 7:00 PM.`;
                        } else if (/(risk|fungus|pest|disease|bug|mildew|ventilation)/.test(lowerInput)) {
                            response = `**Biological Risk Scanner:**\nI detect a **12% probability** of Mildew.\n\n*Countermeasures:* I forced your module's extractors to 100% between 02:00 and 06:00 AM to break foliar humidity. Risk contained.`;
                        } else if (/(harvest|collection|production|tomato|fruit|when|time)/.test(lowerInput)) {
                            response = `**Harvest Projection:**\n\n• **Estimated Time:** 14 days.\n• **Projected Yield:** ~2.85 kg.\n• **Average Size:** 25-30 mm.\n\n*Market Note:* Current estimated value in BCN is **€14.20** (+12%).`;
                        } else if (/(map|city|network|bcn|barcelona|global|statistics|savings)/.test(lowerInput)) {
                            response = `**Global Impact (Barcelona Network):**\nYour module is key among the 3,450 devices in the city.\n\n• **Accumulated Water Savings:** 12,450 L.\n• **Carbon Footprint:** -450 kg CO2.`;
                        } else if (/(tech|support|error|pump|sensor|fail|broken)/.test(lowerInput)) {
                            response = `**Hardware Diagnostics:**\n• Pressure valve: OK (1.2 Bar).\n• NPK Probe: OK.\n• Pump: Flow at 3L/min.\nEverything physically responds. Should I generate a ticket with the City Council if there are leaks?`;
                        }

                        setMessages(prev => [...prev, { sender: 'bot', text: response }]);
                    }, 600);
                }
            };

            return (
                <div className="flex w-full h-full gap-6">
                    {/* --- SIDEBAR --- */}
                    <div className="sidebar w-24 rounded-[30px] flex flex-col items-center py-8 gap-10 shadow-2xl flex-shrink-0 z-50">
                        <div className="text-5xl hover:scale-110 transition-transform cursor-pointer drop-shadow-[0_0_15px_rgba(255,255,255,0.6)]">💧</div>
                        <div className="flex flex-col gap-10 text-white mt-4">
                            <span onClick={() => handleNavigate('profile')} className={`cursor-pointer transition-all flex justify-center ${activeView === 'profile' ? 'opacity-100 bg-white/20 p-3 rounded-xl' : 'opacity-40 hover:opacity-100'}`}><IconProfile/></span>
                            <span onClick={() => handleNavigate('management')} className={`cursor-pointer transition-all flex justify-center ${activeView === 'management' ? 'opacity-100 bg-white/20 p-3 rounded-xl' : 'opacity-40 hover:opacity-100'}`}><IconDashboard/></span>
                            <span onClick={() => handleNavigate('urban')} className={`cursor-pointer transition-all flex justify-center ${activeView === 'urban' ? 'opacity-100 bg-white/20 p-3 rounded-xl' : 'opacity-40 hover:opacity-100'}`}><IconMap/></span>
                            <span onClick={() => handleNavigate('settings')} className={`cursor-pointer transition-all flex justify-center mt-auto ${activeView === 'settings' ? 'opacity-100 bg-white/20 p-3 rounded-xl' : 'opacity-40 hover:opacity-100'}`}><IconSettings/></span>
                        </div>
                    </div>

                    {/* --- ANIMATED LOADING SCREEN --- */}
                    {isLoadingView ? (
                        <div className="flex-1 glass-card rounded-[30px] flex flex-col items-center justify-center fade-in-scale z-40 bg-white/80">
                            <h1 className="text-6xl font-black text-gray-900 tracking-tighter drop-shadow-md mb-4 animate-pulse">HOLY WOAH</h1>
                            <div className="flex items-center text-xl font-bold text-blue-500 tracking-widest uppercase">
                                LOADING
                                <span className="animate-[bounce_1.2s_infinite] mx-0.5 ml-1">.</span>
                                <span className="animate-[bounce_1.2s_infinite_0.15s] mx-0.5">.</span>
                                <span className="animate-[bounce_1.2s_infinite_0.3s] mx-0.5">.</span>
                            </div>
                        </div>
                    ) : (
                        <>
                            {/* VIEW 1: PROFILE */}
                            {activeView === 'profile' && (
                                <div className="flex-1 glass-card rounded-[30px] p-12 fade-in flex flex-col overflow-y-auto">
                                    <h2 className="text-5xl font-bold text-gray-800 mb-12">HOLY WOAH <span className="text-xl text-gray-500 block mt-2">Profile & Account</span></h2>
                                    <div className="flex gap-12 max-w-4xl">
                                        <div className="flex flex-col items-center gap-6">
                                            <div className="relative group">
                                                <img src={avatarPic} alt="Avatar" className="w-48 h-48 rounded-[2rem] object-cover border-4 border-white shadow-xl transition-transform group-hover:scale-105" />
                                                <input type="file" ref={fileInputRef} onChange={handleImageChange} className="hidden" accept="image/*" />
                                                <div onClick={() => fileInputRef.current.click()} className="absolute inset-0 bg-black/40 rounded-[2rem] opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity cursor-pointer"><span className="text-white font-bold">Change</span></div>
                                            </div>
                                            <div className="text-center"><span className="bg-green-100 text-green-700 font-bold px-3 py-1 rounded-full text-xs uppercase tracking-wide">Pro User</span></div>
                                        </div>
                                        <div className="flex-1 flex flex-col gap-6">
                                            <div className="grid grid-cols-2 gap-6">
                                                <div><label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Username</label><input type="text" value={userName} onChange={(e) => setUserName(e.target.value)} className="w-full bg-white/70 border border-gray-200 rounded-2xl px-5 py-4 text-lg font-bold text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-sm transition-all" /></div>
                                                <div><label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Email Address</label><input type="email" value={userEmail} onChange={(e) => setUserEmail(e.target.value)} className="w-full bg-white/70 border border-gray-200 rounded-2xl px-5 py-4 text-lg font-bold text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-sm transition-all" /></div>
                                            </div>
                                            <div className="mt-4">
                                                <h3 className="text-lg font-bold text-gray-800 mb-4 border-b border-gray-200 pb-2">Device Management</h3>
                                                <div className="bg-gradient-to-r from-blue-50 to-blue-100/50 border border-blue-100 p-6 rounded-[2rem] flex justify-between items-center shadow-sm">
                                                    <div>
                                                        <h4 className="font-bold text-gray-800 text-xl mb-1">Eixample Terrace</h4>
                                                        <div className="flex gap-4 mt-2 text-sm"><span className="text-gray-600 bg-white/60 px-2 py-1 rounded-md border border-gray-200 shadow-sm">ID: <span className="font-mono font-bold">#HW-BCN-002</span></span><span className="text-gray-600 bg-white/60 px-2 py-1 rounded-md border border-gray-200 shadow-sm">Registered: <span className="font-bold">12/05/2023</span></span></div>
                                                        <div className="flex items-center gap-2 mt-3"><div className="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div><p className="text-sm text-green-700 font-bold">Module Connected and Active</p></div>
                                                    </div>
                                                    <div className="flex flex-col items-end">
                                                        <button onClick={handleSync} disabled={isSyncing} className={`px-6 py-4 rounded-2xl font-bold text-white shadow-md transition-all ${isSyncing ? 'bg-gray-400 cursor-not-allowed' : 'bg-black hover:bg-gray-800 hover:shadow-xl hover:-translate-y-1'}`}>{isSyncing ? 'Syncing...' : 'Sync Data'}</button>
                                                        <div className="h-6 mt-2">{syncStatus && <p className="text-sm font-bold text-green-600">{syncStatus}</p>}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* VIEW 2: MANAGEMENT */}
                            {activeView === 'management' && (
                                <div className="flex-1 flex gap-6 fade-in h-full">
                                    <div className="flex-1 flex flex-col gap-6 overflow-y-auto pr-2 pb-4 pt-2 custom-scrollbar">
                                        
                                        {/* Row 1: Header */}
                                        <div className="glass-card rounded-[30px] p-6 flex justify-between items-center relative overflow-hidden flex-shrink-0 bg-white/80">
                                            <div className="z-10"><h1 className="text-4xl font-bold text-gray-800 mb-1">Hello, {userName}!</h1><p className="text-gray-500">HOLY WOAH: AI-Powered Decision Support</p></div>
                                            <div className="z-10 bg-green-50 border border-green-200 p-4 rounded-2xl flex flex-col items-center min-w-[200px] shadow-sm"><span className="text-xs font-bold text-green-700 uppercase tracking-wide mb-1">Next Harvest</span><div className="text-xl font-black text-gray-800 font-mono">{countdownStr}</div></div>
                                        </div>

                                        {/* Row 2: WEATHER WIDGET */}
                                        <div className="glass-card rounded-[30px] p-6 flex-shrink-0 flex items-center justify-between bg-gradient-to-r from-sky-50 to-white border border-sky-100 shadow-sm">
                                            <div className="flex items-center gap-5">
                                                <div className="text-5xl drop-shadow-sm">⛅</div>
                                                <div>
                                                    <h3 className="text-xl font-bold text-gray-800">Barcelona, Eixample</h3>
                                                    <p className="text-sm font-medium text-sky-600">Droppy AI Active Forecast</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-8">
                                                <div className="flex flex-col items-center"><span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Temp</span><span className="text-xl font-black text-gray-700">18°C</span></div>
                                                <div className="flex flex-col items-center"><span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Humidity</span><span className="text-xl font-black text-blue-600">65%</span></div>
                                                <div className="flex flex-col items-center"><span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Wind</span><span className="text-xl font-black text-gray-700">12 km/h</span></div>
                                                <div className="flex flex-col items-center"><span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Precipitation</span><span className="text-xl font-black text-blue-500">85%</span></div>
                                                <div className="flex flex-col items-center"><span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">CO2 Level</span><span className="text-xl font-black text-emerald-600">412 ppm</span></div>
                                            </div>
                                        </div>
                                        
                                        {/* Row 3: Active Metrics */}
                                        <div className="glass-card rounded-[30px] p-6 flex-shrink-0">
                                            <h3 className="text-xl font-bold text-gray-800 mb-4">Active Module Metrics</h3>
                                            <div className="grid grid-cols-4 gap-4">
                                                <MiniLineChart data={weekData} dataKey="ph" label="pH Level" max={10} trend="+5.2% ↗" trendUp={true} unit="" />
                                                <MiniLineChart data={weekData} dataKey="water" label="Water Reserve" max={100} trend="-12.4% ↘" trendUp={false} unit="L" />
                                                <MiniBarChartGradient data={weekData} dataKey="potassium" label="Potassium" max={60} unit="mg" trend="+2.1% ↗" trendUp={true} />
                                                <MiniBarChartGradient data={weekData} dataKey="sodium" label="Sodium" max={30} unit="mg" trend="-8.0% ↘" trendUp={false} />
                                            </div>
                                        </div>
                                        
                                        {/* Row 4: Digital Twin & Circulares */}
                                        <div className="flex gap-4 h-[240px] flex-shrink-0">
                                            <div className="glass-card rounded-[30px] p-6 flex-1 flex flex-col relative"><h3 className="font-semibold text-lg mb-2">Digital Twin</h3><div className="flex-1 bg-gray-100 rounded-2xl border border-white flex items-center justify-center flex-col shadow-inner"><p className="text-gray-500 font-medium text-xs">Connect WebSocket for 3D render</p></div></div>
                                            <div className="w-[180px] glass-card rounded-[30px] p-5 flex flex-col items-center justify-center bg-blue-50/50 relative overflow-hidden border border-blue-100"><div className="text-center w-full mb-2"><h3 className="font-semibold text-gray-800 text-xs uppercase">Water Savings</h3></div><CircularWaterChart percentage={45} /></div>
                                            <div className="w-[220px] glass-card rounded-[30px] p-5 flex flex-col items-center bg-green-50/50 relative overflow-hidden border border-green-100"><div className="text-center w-full mb-2"><h3 className="font-semibold text-gray-800 text-xs mb-0 uppercase">Crop Health</h3><p className="text-3xl font-black text-green-600">78.5%</p></div><RealRadarChart data={weekData[6]} /></div>
                                        </div>
                                    </div>
                                    
                                    {/* Sidebar Chatbot */}
                                    <div className="w-[380px] flex flex-col pt-2 pb-4">
                                        <div className="glass-card rounded-[30px] p-0 flex-1 flex flex-col relative overflow-hidden h-full shadow-lg">
                                            <div className="bg-gradient-to-b from-blue-50 to-white p-6 pb-4 border-b border-gray-100 shadow-sm z-10 flex justify-between items-center"><div className="flex items-center gap-3"><div className="text-5xl drop-shadow-sm">💧</div><div><h3 className="font-bold text-lg text-gray-800 leading-tight">Droppy AI</h3><span className="text-xs text-green-600 font-semibold flex items-center gap-1"><div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> Online</span></div></div><button onClick={clearChat} className="bg-white border border-gray-200 p-2 rounded-lg hover:bg-gray-100 transition"><svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="black" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg></button></div>
                                            <div className="flex-1 p-4 overflow-y-auto smooth-scroll flex flex-col gap-4 bg-gray-50/50">{messages.map((msg, i) => <div key={i} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}><div className={`p-4 max-w-[88%] rounded-2xl text-sm whitespace-pre-wrap leading-relaxed shadow-sm ${msg.sender === 'user' ? 'bg-black text-white rounded-tr-none' : 'bg-white border border-gray-100 rounded-tl-none text-gray-800'}`}><span dangerouslySetInnerHTML={{__html: msg.text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}} /></div></div>)}<div ref={chatEndRef} /></div>
                                            <div className="p-4 bg-white border-t border-gray-100 z-10"><div className="flex gap-2"><input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyPress={handleSendMessage} placeholder="Ex: General summary or Why is health at 78%?" className="flex-1 bg-gray-100 border-none rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all" /><button onClick={handleSendMessage} className="bg-black text-white w-12 h-12 rounded-xl flex items-center justify-center hover:bg-gray-800 transition transform hover:scale-105">↑</button></div></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* VIEW 3: INTERACTIVE 3D MAP */}
                            {activeView === 'urban' && (
                                <div className="flex-1 flex gap-6 fade-in h-full w-full overflow-hidden">
                                    <div className="flex-1 glass-card rounded-[30px] p-2 relative overflow-hidden border-4 border-white/50 shadow-inner h-full">
                                        <h3 className="absolute top-6 left-6 z-20 text-2xl font-bold bg-white/90 px-6 py-3 rounded-2xl shadow-lg backdrop-blur-md">Barcelona Network ({allUrbanModules.length})</h3>
                                        <div className="absolute top-6 right-6 z-20 bg-black/90 text-white p-5 rounded-2xl shadow-xl backdrop-blur-md">
                                            <h4 className="text-xs font-bold uppercase text-gray-400 mb-3 tracking-wider">City Metrics</h4>
                                            <div className="flex items-center justify-between gap-8 mb-3 border-b border-gray-700 pb-2"><span className="font-medium">Overall Health</span><span className="font-bold text-green-400 text-lg">87.4%</span></div>
                                            <div className="flex items-center justify-between gap-8"><span className="font-medium">Water Savings</span><span className="font-bold text-blue-400 text-lg">45.1%</span></div>
                                        </div>
                                        <UrbanMap3D modules={allUrbanModules} onSelectModule={setSelectedModule} selectedModuleId={selectedModule.id} />
                                    </div>

                                    <div className="w-[420px] flex flex-col gap-6 fade-in h-full overflow-hidden pb-4 pt-2 pr-2">
                                        <div className={`glass-card rounded-[30px] p-8 flex-shrink-0 shadow-sm border bg-white/60 transition-colors ${selectedModule.status === 'red' ? 'border-red-300' : 'border-white/50'}`}>
                                            <h2 className="text-2xl font-bold mb-6 border-b pb-4 flex items-center gap-2">
                                                Module Details 
                                                {selectedModule.isMine && <span className="bg-blue-100 text-blue-600 text-[10px] px-2 py-1 rounded-full uppercase tracking-widest ml-auto">Yours</span>}
                                            </h2>
                                            <div className="flex flex-col gap-4">
                                                <div className="flex items-center gap-4 mb-2">
                                                    <div className={`w-4 h-4 rounded-full shadow-md ${selectedModule.status === 'green' ? 'bg-green-500' : 'bg-red-500 pulse-red'}`}></div>
                                                    <h3 className="text-xl font-bold text-gray-800">{selectedModule.name}</h3>
                                                </div>
                                                {selectedModule.status === 'red' && (
                                                    <div className="bg-red-50 border border-red-200 p-4 rounded-2xl shadow-sm mb-2">
                                                        <h4 className="font-bold text-red-800 mb-2">Attention Required</h4>
                                                        <div className="flex flex-col gap-1">
                                                            <p className="text-xs text-red-700"><strong className="text-red-900 uppercase">Issue:</strong> {selectedModule.issue}</p>
                                                            <p className="text-xs text-red-700"><strong className="text-red-900 uppercase">Action:</strong> {selectedModule.action}</p>
                                                        </div>
                                                    </div>
                                                )}
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100 shadow-sm"><p className="text-[10px] text-gray-500 font-bold uppercase mb-1">Water</p><p className="text-2xl font-black text-blue-600">{selectedModule.water}</p></div>
                                                    <div className={`p-4 rounded-2xl border shadow-sm ${selectedModule.status === 'green' ? 'bg-green-50 border-green-100' : 'bg-red-50 border-red-100'}`}><p className="text-[10px] text-gray-500 font-bold uppercase mb-1">Health</p><p className={`text-2xl font-black ${selectedModule.status === 'green' ? 'text-green-700' : 'text-red-600'}`}>{selectedModule.health}</p></div>
                                                    <div className="bg-orange-50 p-4 rounded-2xl border border-orange-100 shadow-sm col-span-2"><p className="text-[10px] text-orange-600/80 font-bold uppercase mb-1">Days to Harvest</p><p className="text-2xl font-black text-orange-600">{selectedModule.harvestDays} Days</p></div>
                                                </div>
                                                <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm mt-2"><p className="text-[10px] text-gray-400 font-bold uppercase mb-1">Planted Species</p><p className="text-sm font-bold text-gray-800">{selectedModule.plants}</p></div>
                                            </div>
                                        </div>

                                        <div className="glass-card rounded-[30px] p-6 flex-1 flex flex-col shadow-sm border border-white/50 bg-white/60 overflow-hidden">
                                            <div className="flex gap-4 border-b border-gray-200 mb-4 pb-2">
                                                <button className={`font-bold transition-colors ${urbanRightTab === 'city' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-400 hover:text-gray-600'}`} onClick={() => setUrbanRightTab('city')}>Network Data</button>
                                                <button className={`font-bold transition-colors ${urbanRightTab === 'market' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-400 hover:text-gray-600'}`} onClick={() => setUrbanRightTab('market')}>Demand & Market</button>
                                            </div>
                                            {urbanRightTab === 'city' ? (
                                                <div className="flex-1 flex flex-col fade-in overflow-hidden"><p className="text-xs text-gray-500 mb-4 font-medium flex-shrink-0">Total sum of plants across the Barcelona network.</p><div className="flex-1 flex flex-col gap-4 overflow-y-auto custom-scrollbar pr-3">{urbanCropData.map((crop, idx) => { const maxCrop = Math.max(...urbanCropData.map(c => c.count)); const widthPct = (crop.count / maxCrop) * 100; return (<div key={idx} className="w-full flex-shrink-0"><div className="flex justify-between text-sm font-bold text-gray-700 mb-1"><span>{crop.name}</span><span>{crop.count} pl.</span></div><div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden shadow-inner"><div className={`h-full rounded-full ${crop.color} transition-all duration-1000 ease-out`} style={{ width: `${widthPct}%` }}></div></div></div>) })}</div></div>
                                            ) : (
                                                <div className="flex-1 flex flex-col fade-in overflow-hidden"><p className="text-xs text-gray-500 mb-4 font-medium flex-shrink-0">Predictive recommendations based on urban scarcity and local prices.</p><div className="flex-1 flex flex-col gap-3 overflow-y-auto custom-scrollbar pr-3"><div className="bg-emerald-50 border border-emerald-200 p-4 rounded-2xl shadow-sm"><div className="flex justify-between items-start mb-1"><h4 className="font-bold text-emerald-800">Arugula</h4><span className="bg-emerald-200 text-emerald-800 text-[9px] font-bold px-2 py-0.5 rounded-full uppercase">High Demand</span></div><p className="text-xs text-emerald-600 mb-2">Few plantations in BCN (-15% vs previous month).</p><span className="text-sm font-bold bg-white px-2 py-1 rounded text-gray-700 shadow-sm">Market Price: +12%</span></div><div className="bg-orange-50 border border-orange-200 p-4 rounded-2xl shadow-sm"><div className="flex justify-between items-start mb-1"><h4 className="font-bold text-orange-800">Mini Carrots</h4><span className="bg-orange-200 text-orange-800 text-[9px] font-bold px-2 py-0.5 rounded-full uppercase">Ideal Now</span></div><p className="text-xs text-orange-600 mb-2">Optimal weather for the next 4 weeks.</p><span className="text-sm font-bold bg-white px-2 py-1 rounded text-gray-700 shadow-sm">Market Price: Stable</span></div><div className="bg-pink-50 border border-pink-200 p-4 rounded-2xl shadow-sm"><div className="flex justify-between items-start mb-1"><h4 className="font-bold text-pink-800">Strawberries</h4><span className="bg-pink-200 text-pink-800 text-[9px] font-bold px-2 py-0.5 rounded-full uppercase">Opportunity</span></div><p className="text-xs text-pink-600 mb-2">High season upcoming. Scarcity in BCN network.</p><span className="text-sm font-bold bg-white px-2 py-1 rounded text-gray-700 shadow-sm">Market Price: +8%</span></div></div></div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* VIEW 4: SETTINGS */}
                            {activeView === 'settings' && (
                                <div className="flex-1 glass-card rounded-[30px] p-12 fade-in flex flex-col overflow-y-auto">
                                    <h2 className="text-4xl font-bold text-gray-800 mb-8 pb-4 border-b border-gray-200/60">System Settings and Alerts</h2>
                                    <div className="grid grid-cols-2 gap-10 max-w-5xl">
                                        <div className="bg-white/60 p-8 rounded-[2rem] border border-white shadow-sm flex flex-col gap-6 hover:shadow-md transition-shadow">
                                            <div className="flex items-center gap-3"><span className="text-2xl">🔔</span><h3 className="text-xl font-bold text-gray-800">Alert Preferences</h3></div>
                                            <div className="flex flex-col gap-5 mt-2">
                                                <label className="flex items-center justify-between cursor-pointer group"><div><span className="font-bold text-gray-700 block">Critical Irrigation Alerts</span><span className="text-xs text-gray-500">Push notifications if level drops below 10%</span></div><input type="checkbox" defaultChecked className="w-6 h-6 text-blue-600 rounded-lg focus:ring-blue-500 border-gray-300 accent-blue-600" /></label>
                                                <hr className="border-gray-200/60"/>
                                                <label className="flex items-center justify-between cursor-pointer group"><div><span className="font-bold text-gray-700 block">Harvest Warnings</span><span className="text-xs text-gray-500">Notify 3 days before maturation</span></div><input type="checkbox" defaultChecked className="w-6 h-6 text-blue-600 rounded-lg focus:ring-blue-500 border-gray-300 accent-blue-600" /></label>
                                                <hr className="border-gray-200/60"/>
                                                <label className="flex items-center justify-between cursor-pointer group"><div><span className="font-bold text-gray-700 block">Droppy AI Tips</span><span className="text-xs text-gray-500">Weekly predictive suggestions</span></div><input type="checkbox" defaultChecked className="w-6 h-6 text-blue-600 rounded-lg focus:ring-blue-500 border-gray-300 accent-blue-600" /></label>
                                            </div>
                                        </div>
                                        <div className="bg-white/60 p-8 rounded-[2rem] border border-white shadow-sm flex flex-col gap-6 hover:shadow-md transition-shadow">
                                            <div className="flex items-center gap-3"><span className="text-2xl">⚙️</span><h3 className="text-xl font-bold text-gray-800">General Configuration</h3></div>
                                            <div className="flex flex-col gap-5 mt-2">
                                                <div className="flex flex-col gap-2"><label className="font-bold text-gray-700 text-sm">Interface Language</label><select className="bg-white border border-gray-200 rounded-xl px-4 py-3 font-medium text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-sm cursor-pointer"><option>English (US)</option><option>Spanish (ES)</option><option>Català</option></select></div>
                                                <div className="flex flex-col gap-2 mt-2"><label className="font-bold text-gray-700 text-sm">Network Privacy (Urban Map)</label><select className="bg-white border border-gray-200 rounded-xl px-4 py-3 font-medium text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-sm cursor-pointer"><option>Share anonymous metrics (Recommended)</option><option>Private Mode (Hide from network)</option></select></div>
                                            </div>
                                        </div>
                                        <div className="bg-[#111] text-white p-8 rounded-[2rem] shadow-xl flex flex-col gap-6 col-span-2 relative overflow-hidden">
                                            <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl"></div>
                                            <div className="flex justify-between items-end border-b border-gray-700 pb-4 z-10"><div><h3 className="text-xl font-bold flex items-center gap-3"><span className="text-2xl">🔧</span> Hardware Diagnostics</h3><p className="text-gray-400 text-sm mt-1">Status of local sensors for module #HW-BCN-002</p></div><button className="text-sm font-bold bg-white/10 hover:bg-white/20 transition-colors px-4 py-2 rounded-xl">Run Test</button></div>
                                            <div className="grid grid-cols-3 gap-6 z-10">
                                                <div className="bg-white/5 border border-white/10 p-5 rounded-2xl"><div className="flex items-center gap-3 mb-3"><div className="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.6)]"></div><span className="font-bold text-gray-200">NPK Sensors</span></div><p className="text-sm text-gray-400">Calibrated 2 days ago. Stable readings.</p></div>
                                                <div className="bg-white/5 border border-white/10 p-5 rounded-2xl"><div className="flex items-center gap-3 mb-3"><div className="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.6)] animate-pulse"></div><span className="font-bold text-gray-200">Irrigation Valve</span></div><p className="text-sm text-gray-400">Correct flow. Pressure: 1.2 Bar.</p></div>
                                                <div className="bg-white/5 border border-white/10 p-5 rounded-2xl"><div className="flex items-center gap-3 mb-3"><div className="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.6)]"></div><span className="font-bold text-gray-200">WiFi Connection</span></div><p className="text-sm text-gray-400">Excellent Signal (-45 dBm). Net: BCN-IOT.</p></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
