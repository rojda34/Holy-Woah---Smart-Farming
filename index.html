<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLY WOAH - Dashboard Pro V12</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #e0eaf5 0%, #f4f7f6 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .sidebar { background-color: #111111; color: white; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Animaciones Gráficos (Solo al cargar) */
        .chart-container { display: flex; align-items: flex-end; height: 120px; gap: 4px; }
        .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; height: 100%; cursor: pointer; position: relative; }
        .chart-bar { width: 100%; border-top-left-radius: 4px; border-top-right-radius: 4px; transform-origin: bottom; animation: growBar 1s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
        @keyframes growBar { from { transform: scaleY(0); } to { transform: scaleY(1); } }
        .chart-bar-wrap:hover .chart-bar { opacity: 0.8; }
        .chart-bar-wrap:hover .tooltip { display: block; }
        
        .animate-draw-line { stroke-dasharray: 500; stroke-dashoffset: 500; animation: drawLine 1.5s ease-out forwards; }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        
        .circle-progress-anim { animation: drawCircleProgress 1.5s ease-out forwards; }
        @keyframes drawCircleProgress { from { stroke-dashoffset: 283; } } /* 283 es la longitud de la circunferencia aprox */

        .tooltip { display: none; position: absolute; bottom: calc(100% + 5px); background: #111; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; z-index: 50; }
        
        .pulse-red { animation: pulse-red-anim 2s infinite; }
        @keyframes pulse-red-anim { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .line-hover-zone:hover .line-tooltip { display: block; }
        .line-tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; z-index: 50; margin-bottom: 5px; }
        
        .custom-leaflet-icon { background: transparent; border: none; }
        .leaflet-container { background: #e5e7eb; font-family: inherit; z-index: 10; }
        
        /* Custom Scrollbar for urban tabs */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }

        .smooth-scroll::-webkit-scrollbar { width: 6px; }
        .smooth-scroll::-webkit-scrollbar-track { background: transparent; }
        .smooth-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-4 h-screen w-screen overflow-hidden flex items-center justify-center">

    <div id="root" class="w-full h-full max-w-[1600px] flex gap-6"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Generador inteligente para colocar los puntos SÓLO en los edificios (Clustering simulado)
        const generateModules = () => {
            const mods = [];
            let idCounter = 1;
            const issues = ["Bomba obstruida", "Fuga de agua", "PH desbalanceado (Ácido)", "Sensor NPK fallando", "Infección fúngica detectada"];
            const actions = ["Enviando técnico de purga", "Sellado automático válvula B", "Inyectando solución alcalina buffer", "Reiniciando telemetría", "Aumentando ventilación al 100%"];

            // Generamos 90 "manzanas" (centros de edificios) aleatorias en Barcelona
            const blockCenters = [];
            for (let i = 0; i < 90; i++) {
                blockCenters.push({
                    lat: 41.375 + (Math.random() * 0.045), // Rango de latitudes urbanas BCN
                    lng: 2.140 + (Math.random() * 0.055)  // Rango de longitudes urbanas BCN
                });
            }

            // Alrededor de cada manzana, colocamos 3 o 4 módulos muy pegados (esto evita las calles)
            blockCenters.forEach(center => {
                const modulesInBlock = Math.floor(Math.random() * 3) + 2; // 2 a 4 por edificio
                for(let i=0; i<modulesInBlock; i++) {
                    // Offset de máximo 15 metros para garantizar que caen en el mismo "tejado"
                    const latOffset = (Math.random() - 0.5) * 0.0003; 
                    const lngOffset = (Math.random() - 0.5) * 0.0003;
                    const isRed = Math.random() > 0.88; 
                    const issueIdx = Math.floor(Math.random() * issues.length);

                    mods.push({
                        id: idCounter,
                        name: `Módulo BCN-${idCounter.toString().padStart(3, '0')}`,
                        status: isRed ? "red" : "green",
                        lat: center.lat + latOffset,
                        lng: center.lng + lngOffset,
                        water: Math.floor(Math.random() * 450 + 50) + " L",
                        health: isRed ? Math.floor(Math.random() * 30 + 30) + "%" : Math.floor(Math.random() * 15 + 85) + "%",
                        plants: ["Tomates", "Lechuga", "Fresas", "Menta", "Albahaca", "Pimientos"][Math.floor(Math.random()*6)],
                        harvestDays: Math.floor(Math.random() * 25 + 2),
                        isMine: idCounter === 2,
                        issue: isRed ? issues[issueIdx] : null,
                        action: isRed ? actions[issueIdx] : null
                    });
                    idCounter++;
                }
            });
            
            // Forzamos que el tuyo exista donde queremos
            mods[1].isMine = true;
            mods[1].name = "Terraza Eixample (MI MÓDULO)";
            mods[1].status = "green";
            mods[1].lat = 41.3888;
            mods[1].lng = 2.1616;
            return mods;
        };

        const allUrbanModules = generateModules();

        const urbanCropData = [
            { name: "Tomates", count: 3450, color: "bg-red-500" },
            { name: "Lechuga", count: 2890, color: "bg-green-400" },
            { name: "Menta", count: 1640, color: "bg-teal-500" },
            { name: "Fresas", count: 1290, color: "bg-pink-500" },
            { name: "Albahaca", count: 910, color: "bg-emerald-600" },
            { name: "Pimientos", count: 780, color: "bg-orange-500" },
            { name: "Rúcula", count: 650, color: "bg-green-600" },
            { name: "Zanahorias", count: 520, color: "bg-orange-400" },
            { name: "Cebollino", count: 410, color: "bg-green-300" },
            { name: "Berenjenas", count: 230, color: "bg-purple-500" }
        ];

        const initialWeekData = [
            { day: 'Lun', ph: 6.2, water: 60, potasio: 30, sodio: 10 },
            { day: 'Mar', ph: 6.5, water: 80, potasio: 45, sodio: 15 },
            { day: 'Mié', ph: 6.6, water: 75, potasio: 42, sodio: 16 },
            { day: 'Jue', ph: 6.4, water: 50, potasio: 38, sodio: 14 },
            { day: 'Vie', ph: 6.8, water: 90, potasio: 50, sodio: 18 },
            { day: 'Sáb', ph: 6.5, water: 85, potasio: 48, sodio: 15 },
            { day: 'Dom', ph: 6.5, water: 70, potasio: 44, sodio: 14 }
        ];

        const IconProfile = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-8 h-8"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>;
        const IconDashboard = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-8 h-8"><path strokeLinecap="round" strokeLinejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" /></svg>;
        const IconMap = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-8 h-8"><path strokeLinecap="round" strokeLinejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z" /></svg>;
        const IconSettings = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-8 h-8"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12a7.5 7.5 0 0115 0m-15 0a7.5 7.5 0 1115 0m-15 0H3m16.5 0H21m-1.5 0a7.5 7.5 0 11-15 0m15 0a7.5 7.5 0 10-15 0M4.5 19.5l-2.25-2.25M19.5 4.5l2.25 2.25m-15 0l-2.25 2.25m15 10.5l2.25-2.25" /></svg>;

        const UrbanMap = ({ modules, onSelectModule, selectedModuleId }) => {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markersRef = useRef({});

            useEffect(() => {
                if (!mapInstance.current && mapRef.current) {
                    mapInstance.current = L.map(mapRef.current, { zoomControl: false }).setView([41.388, 2.16], 14);
                    
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                        maxZoom: 19,
                        attribution: '&copy; CartoDB'
                    }).addTo(mapInstance.current);

                    L.control.zoom({ position: 'bottomright' }).addTo(mapInstance.current);
                    
                    // Ya no dibujamos las líneas discontinuas (distritos)
                }

                // Actualizar marcadores
                if (mapInstance.current) {
                    Object.values(markersRef.current).forEach(marker => mapInstance.current.removeLayer(marker));
                    markersRef.current = {};

                    modules.forEach(mod => {
                        const isSelected = selectedModuleId === mod.id;
                        const baseClasses = "w-4 h-4 rounded-full shadow-md cursor-pointer flex items-center justify-center transition-all duration-300";
                        const statusClass = mod.status === 'green' ? 'bg-green-500' : 'bg-red-500 pulse-red';
                        const borderClass = mod.isMine ? 'border-[3px] border-blue-500 ring-4 ring-blue-200 z-50' : 'border-[2px] border-white';
                        
                        const selectedStyles = isSelected ? 'scale-[2.5] ring-4 ring-yellow-400 z-[9999] shadow-2xl' : 'hover:scale-125';
                        const innerDot = mod.isMine ? '<div class="w-1.5 h-1.5 bg-white rounded-full"></div>' : '';

                        const iconHtml = `<div class="relative ${baseClasses} ${statusClass} ${borderClass} ${selectedStyles}">${innerDot}</div>`;
                        const icon = L.divIcon({ html: iconHtml, className: 'custom-leaflet-icon', iconSize: [16, 16], iconAnchor: [8, 8] });
                        
                        const marker = L.marker([mod.lat, mod.lng], { icon, zIndexOffset: isSelected ? 2000 : (mod.status === 'red' ? 1000 : 0) })
                            .addTo(mapInstance.current)
                            .on('click', () => { 
                                onSelectModule(mod); 
                                mapInstance.current.flyTo([mod.lat, mod.lng], 16, { animate: true, duration: 1 });
                            });
                        
                        markersRef.current[mod.id] = marker;
                    });
                }
            }, [modules, selectedModuleId]);

            return <div ref={mapRef} className="w-full h-full z-10 rounded-2xl"></div>;
        };

        const RealRadarChart = ({ data }) => {
            const maxes = { ph: 10, potasio: 60, water: 100, sodio: 30 };
            const metrics = ['ph', 'potasio', 'water', 'sodio']; 
            const radius = 40; const center = 50;
            
            const points = metrics.map((m, i) => {
                const angle = (Math.PI * 2 * i) / metrics.length - Math.PI / 2;
                const r = (data[m] / maxes[m]) * radius;
                return `${center + r * Math.cos(angle)},${center + r * Math.sin(angle)}`;
            }).join(' ');

            return (
                <div className="w-full h-[120px] flex items-center justify-center relative">
                    <svg viewBox="0 0 100 100" className="w-full h-full overflow-visible">
                        {/* Ejes */}
                        <polygon points="50,10 90,50 50,90 10,50" fill="none" stroke="#bbf7d0" strokeWidth="0.5" />
                        <polygon points="50,30 70,50 50,70 30,50" fill="none" stroke="#bbf7d0" strokeWidth="0.5" />
                        <line x1="50" y1="10" x2="50" y2="90" stroke="#bbf7d0" strokeWidth="0.5" />
                        <line x1="10" y1="50" x2="90" y2="50" stroke="#bbf7d0" strokeWidth="0.5" />
                        
                        {/* Área de datos */}
                        <polygon points={points} fill="rgba(34,197,94,0.3)" stroke="#16a34a" strokeWidth="1.5" strokeLinejoin="round" className="animate-draw-line" />
                        
                        {/* Puntos y Textos de valores */}
                        {metrics.map((m, i) => {
                            const angle = (Math.PI * 2 * i) / metrics.length - Math.PI / 2;
                            const r = (data[m] / maxes[m]) * radius;
                            const cx = center + r * Math.cos(angle);
                            const cy = center + r * Math.sin(angle);
                            
                            // Posicionamiento de los textos para que no se pisen con los puntos
                            let textAnchor = "middle"; let dx = 0; let dy = 0;
                            if (i === 0) { dy = -6; } // pH Arriba
                            if (i === 1) { textAnchor = "start"; dx = 6; dy = 3; } // Potasio Derecha
                            if (i === 2) { dy = 10; } // Agua Abajo
                            if (i === 3) { textAnchor = "end"; dx = -6; dy = 3; } // Sodio Izquierda

                            return (
                                <g key={m}>
                                    <circle cx={cx} cy={cy} r="3" fill="#15803d" stroke="#fff" strokeWidth="1" />
                                    <text x={cx} y={cy} dx={dx} dy={dy} fontSize="6" fontWeight="bold" fill="#064e3b" textAnchor={textAnchor}>
                                        {data[m]}
                                    </text>
                                </g>
                            )
                        })}
                    </svg>
                    <span className="absolute text-[9px] font-bold text-green-700 top-0 left-1/2 -translate-x-1/2 -mt-2">pH</span>
                    <span className="absolute text-[9px] font-bold text-green-700 top-1/2 right-0 translate-y-[-50%] -mr-4">K</span>
                    <span className="absolute text-[9px] font-bold text-green-700 bottom-0 left-1/2 -translate-x-1/2 -mb-2">H2O</span>
                    <span className="absolute text-[9px] font-bold text-green-700 top-1/2 left-0 translate-y-[-50%] -ml-4">Na</span>
                </div>
            );
        };

        const CircularWaterChart = ({ percentage }) => {
            const sqSize = 100;
            const strokeWidth = 10;
            const radius = (sqSize - strokeWidth) / 2;
            const viewBox = `0 0 ${sqSize} ${sqSize}`;
            const dashArray = radius * Math.PI * 2;
            const dashOffset = dashArray - dashArray * percentage / 100;

            return (
                <div className="relative flex items-center justify-center">
                    <svg width={sqSize} height={sqSize} viewBox={viewBox}>
                        <circle className="stroke-blue-100" cx={sqSize/2} cy={sqSize/2} r={radius} strokeWidth={`${strokeWidth}px`} fill="none" />
                        <circle className="stroke-blue-500 circle-progress-anim" cx={sqSize/2} cy={sqSize/2} r={radius} strokeWidth={`${strokeWidth}px`} fill="none" strokeDasharray={dashArray} strokeDashoffset={dashOffset} strokeLinecap="round" transform={`rotate(-90 ${sqSize/2} ${sqSize/2})`} />
                    </svg>
                    <div className="absolute inset-0 flex items-center justify-center flex-col">
                        <span className="text-2xl font-black text-blue-600 leading-none">{percentage}%</span>
                    </div>
                </div>
            );
        }

        // API Integration - Real ML Model Predictions
        const fetchPredictions = async (moduleId) => {
            try {
                // Sample sensor data for demo
                const requestData = {
                    module_id: `BCN-${moduleId.toString().padStart(3, '0')}`,
                    // Environmental data
                    temp: 22.5 + Math.random() * 5,
                    humidity: 60 + Math.random() * 20,
                    solar_radiation: 4 + Math.random() * 2,
                    wind_speed: 1.5 + Math.random() * 2,
                    soil_moisture: 40 + Math.random() * 20,
                    soil_ec: 800 + Math.random() * 200,
                    floor_level: Math.floor(Math.random() * 5) + 1,
                    orientation: Math.random() * 360,
                    // Spectral indices (for disease detection)
                    ndvi: 0.6 + Math.random() * 0.2,
                    nir_red: 2.2 + Math.random() * 0.3,
                    red_edge: 0.4 + Math.random() * 0.1,
                    swir: 0.35 + Math.random() * 0.1,
                    ndvi_delta: -0.02 + Math.random() * 0.04,
                    crop_type: Math.floor(Math.random() * 6),
                    // Urban context
                    city_water_pressure: 3.0 + Math.random() * 0.5,
                    tariff_slot: Math.floor(Math.random() * 3) + 1,
                    weather_24h: Math.floor(Math.random() * 6),
                    active_buildings: 100 + Math.floor(Math.random() * 50)
                };

                const response = await fetch('http://127.0.0.1:5000/api/predict/full-module', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.statusText}`);
                }

                const prediction = await response.json();
                return prediction.success ? prediction : null;
            } catch (error) {
                console.warn('API unavailable, using mock data:', error);
                return null;
            }
        };

        function App() {
            const [activeView, setActiveView] = useState('management'); 
            const [selectedModule, setSelectedModule] = useState(allUrbanModules[1]); 
            const [userName, setUserName] = useState("Marita");
            const [userEmail, setUserEmail] = useState("marita.botanica@bcn.es");
            const [avatarPic, setAvatarPic] = useState("https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&auto=format&fit=crop&w=256&q=80");
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncStatus, setSyncStatus] = useState("");
            const [urbanRightTab, setUrbanRightTab] = useState('city');
            const [predictions, setPredictions] = useState(null);
            const [apiConnected, setApiConnected] = useState(false);
            const fileInputRef = useRef(null);
            
            // Datos estáticos, ya no se actualizan con setInterval para evitar mareos
            const [weekData] = useState(initialWeekData);

            // Check API connectivity and load predictions
            useEffect(() => {
                const checkApiAndLoadData = async () => {
                    try {
                        const healthResponse = await fetch('http://127.0.0.1:5000/api/health');
                        if (healthResponse.ok) {
                            setApiConnected(true);
                            // Load predictions for selected module
                            const pred = await fetchPredictions(selectedModule.id);
                            if (pred) setPredictions(pred);
                        }
                    } catch (e) {
                        console.warn('API not connected:', e);
                        setApiConnected(false);
                    }
                };
                
                checkApiAndLoadData();
                // Reload predictions every 30 seconds
                const interval = setInterval(checkApiAndLoadData, 30000);
                return () => clearInterval(interval);
            }, [selectedModule.id]);

            const initialMessage = { sender: 'bot', text: `¡Hola ${userName}! Te puedo ayudar con estas 5 cosas:\n\n1. Revisar estado del cultivo\n2. Optimizar riego (Modelo ANN)\n3. Analizar riesgos fúngicos (Modelo SVM)\n4. Ver historial urbano\n5. Contactar con un técnico\n\n¿De qué quieres hablar?` };
            const [chatInput, setChatInput] = useState("");
            const [messages, setMessages] = useState([initialMessage]);
            const chatEndRef = useRef(null);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const handleSync = () => { setIsSyncing(true); setSyncStatus("Conectando con servidores..."); setTimeout(() => { setSyncStatus("Módulo Sincronizado"); setIsSyncing(false); }, 2000); };
            const clearChat = () => setMessages([initialMessage]);
            
            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setAvatarPic(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSendMessage = (e) => {
                if (e.key === 'Enter' || e.type === 'click') {
                    if (!chatInput.trim()) return;
                    const userMsg = chatInput.trim();
                    const lowerInput = userMsg.toLowerCase();
                    setMessages(prev => [...prev, { sender: 'user', text: userMsg }]);
                    setChatInput("");

                    setTimeout(() => {
                        let response = "Prueba preguntando por el estado (1), riego (2), riesgos (3), mapa (4) o servicio técnico (5).";
                        if (lowerInput.includes("1") || lowerInput.includes("estado") || lowerInput.includes("cultivo")) response = "**Estado del Cultivo:**\nLos tomates están al 85% de salud. El nivel de pH actual es de 6.5 (Óptimo). Todo progresa correctamente.";
                        else if (lowerInput.includes("2") || lowerInput.includes("riego") || lowerInput.includes("agua")) response = "**Optimización de Riego:**\nEl modelo sugiere reducir el riego un 45% esta semana por alta probabilidad de lluvia.";
                        else if (lowerInput.includes("3") || lowerInput.includes("riesgo") || lowerInput.includes("hongo")) response = "**Análisis Fúngico:**\n12% probabilidad de Oídio. Te sugiero aumentar la ventilación del módulo.";
                        else if (lowerInput.includes("4") || lowerInput.includes("mapa") || lowerInput.includes("ciudad")) response = "**Historial Urbano:**\nLa red de Barcelona ha ahorrado 12,450 L de agua este mes.";
                        else if (lowerInput.includes("5") || lowerInput.includes("tecnico")) response = "**Soporte Técnico:**\nHe abierto un ticket de incidencia. Un técnico te contactará en menos de 24 horas.";
                        setMessages(prev => [...prev, { sender: 'bot', text: response }]);
